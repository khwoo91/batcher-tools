<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Stack Layer 3 (Background) -->
  <rect x="10" y="4" width="16" height="16" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.2" opacity="0.4" transform="rotate(-6 18 12)" />
  
  <!-- Stack Layer 2 (Middle) -->
  <rect x="8" y="6" width="16" height="16" rx="4" fill="url(#accent-grad)" stroke="#ffffff" stroke-width="0.8" stroke-opacity="0.15" opacity="0.8" transform="rotate(3 16 14)" />
  
  <!-- Stack Layer 1 (Foreground/Main) -->
  <g transform="translate(4, 8)">
    <!-- Main Card Body -->
    <rect x="0" y="0" width="18" height="18" rx="4.5" fill="url(#primary-grad)" stroke="#ffffff" stroke-width="1" stroke-opacity="0.25" filter="url(#glow)" />
    
    <!-- Image/Vector details on Main Card -->
    <!-- Mountains -->
    <path d="M3 14 L7.5 8.5 L11 12.5 L13 10 L15.5 14 Z" fill="#ffffff" fill-opacity="0.95" />
    <!-- Sun -->
    <circle cx="12.5" cy="5.5" r="2" fill="#34d399" />
  </g>
  
  <!-- Export Dynamic Arrow -->
  <path d="M21 17 L27 17 L27 23 M27 17 L18 26" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>